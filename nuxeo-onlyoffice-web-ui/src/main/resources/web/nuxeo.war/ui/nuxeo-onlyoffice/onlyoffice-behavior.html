<script>
  var Nuxeo = Nuxeo || {};
  (function () {

    /**
     * @polymerBehavior Nuxeo.OnlyOfficeBehavior
     */
    Nuxeo.OnlyOfficeBehavior = {

      properties: {

        document: {
          type: Object
        },

        iFrameSource: {
          type: String,
          value: 'about:blank'
        },

        blob: {
          type: Object
        },

        mode: {
          type: String,
          value: 'desktop'
        },

        editMode: {
          type: Boolean,
          value: false,
          computed: 'isEditMode(mode)'
        },

        xpath: {
          type: String,
          value: 'file:content'
        },

        textTypes: {
          type: Array,
          readOnly: true,
          value: [
            // Microsoft Word
            "application/msword",
            "application/vnd.ms-word.document.macroenabled.12",
            "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            "application/vnd.ms-word.template.macroenabled.12",
            "application/vnd.openxmlformats-officedocument.wordprocessingml.template",
            // OpenDocument text
            "application/vnd.oasis.opendocument.text",
            "application/vnd.oasis.opendocument.text-template",
            // Rich text / plain text (opened as `word`)
            "application/rtf",
            "text/rtf",
            "text/plain"
          ]
        },

        spreadsheetTypes: {
          type: Array,
          readOnly: true,
          value: [
            // Microsoft Excel
            "application/vnd.ms-excel",
            "application/vnd.ms-excel.sheet.macroenabled.12",
            "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
            "application/vnd.ms-excel.template.macroenabled.12",
            "application/vnd.openxmlformats-officedocument.spreadsheetml.template",
            // OpenDocument spreadsheet
            "application/vnd.oasis.opendocument.spreadsheet",
            "application/vnd.oasis.opendocument.spreadsheet-template",
            // CSV
            "text/csv"
          ]
        },

        presentationTypes: {
          type: Array,
          readOnly: true,
          value: [
            // Microsoft PowerPoint
            "application/vnd.ms-powerpoint",
            "application/vnd.ms-powerpoint.presentation.macroenabled.12",
            "application/vnd.openxmlformats-officedocument.presentationml.presentation",
            "application/vnd.ms-powerpoint.slideshow.macroenabled.12",
            "application/vnd.openxmlformats-officedocument.presentationml.slideshow",
            "application/vnd.ms-powerpoint.template.macroenabled.12",
            "application/vnd.openxmlformats-officedocument.presentationml.template",
            "application/vnd.openxmlformats-officedocument.presentationml.slide",
            // OpenDocument presentation
            "application/vnd.oasis.opendocument.presentation",
            "application/vnd.oasis.opendocument.presentation-template"
          ]
        }
      },

      _deepFind: function (obj, props) {
        for (var i = 0, path = props.split('/'), len = path.length; i < len; i++) {
          if (!obj || obj === []) {
            break;
          }
          obj = obj[path[i]];
        }
        return obj;
      },

      isOnlyOfficeDocument: function (document, xpath) {
        if (!xpath) {
          xpath = 'file:content';
        }
        var blob = document && this._deepFind(document.properties, xpath);
        if (blob) {
          return this.isOnlyOfficeCompatible(blob['mime-type']);
        }
        return false;
      },

      isOnlyOfficeCompatible: function (mime) {
        if (this.textTypes.indexOf(mime) >= 0 ||
          this.presentationTypes.indexOf(mime) >= 0 ||
          this.spreadsheetTypes.indexOf(mime) >= 0) {
          return true;
        }
        return false;
      },

      setOnlyOfficeDocument: function (document) {
        this.blob = document && this._deepFind(document.properties, this.xpath);
        if (this.blob) {
          return this.isOnlyOfficeCompatible(this.blob['mime-type']);
        }
        return false;
      },

      // Returns the OnlyOffice documentType (word/cell/slide) for a given mime type.
      // Keep in sync with OnlyOfficeTypes.TEXT / SPREADSHEET / PRESENTATION on the Java side.
      // OnlyOffice 9.x rejects the historical text/spreadsheet/presentation values.
      getDocumentType: function (mime) {
        if (this.presentationTypes.indexOf(mime) >= 0) {
          return "slide";
        } else if (this.spreadsheetTypes.indexOf(mime) >= 0) {
          return "cell";
        }
        return "word";
      },

      isEditMode: function () {
        return this.mode !== 'embedded';
      },

      computeIFrameSource: function () {
        var source = "../api/v1/onlyoffice/editor/" + this.document.uid + "/" + this.xpath + "?mode=" + this.mode;
        return source;
      },

    };
  })();

</script>
